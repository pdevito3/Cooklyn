name: Publish Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 25

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Generate build info
        run: |
          git log --format='%H|||%h|||%s|||%an|||%aI' -n 25 | \
          jq -R -s '
            split("\n") | map(select(length > 0)) | map(split("|||")) |
            map({sha: .[0], shortSha: .[1], message: .[2], author: .[3], date: .[4]})
          ' > /tmp/commits.json

          jq -n \
            --arg sha "${{ github.sha }}" \
            --arg shortSha "${GITHUB_SHA:0:7}" \
            --arg branch "${{ github.ref_name }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg repoUrl "${{ github.server_url }}/${{ github.repository }}" \
            --slurpfile commits /tmp/commits.json \
            '{
              commitSha: $sha,
              shortSha: $shortSha,
              branch: $branch,
              buildTimestamp: $timestamp,
              repositoryUrl: $repoUrl,
              commits: $commits[0]
            }' > build-info.json

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Cooklyn.Server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
